<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="180" rx="16" fill="#070712"/>

  <!-- Step boxes -->
  <g font-family="ui-monospace, Menlo, monospace">
    <rect x="30" y="40" width="200" height="100" rx="12" fill="#0d1b2a" stroke="#00f5d4" stroke-width="2" filter="url(#g)"/>
    <text x="130" y="75" text-anchor="middle" fill="#00f5d4" font-size="13" font-weight="700">1 · CALL</text>
    <text x="130" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">GET /api/…</text>
    <text x="130" y="118" text-anchor="middle" fill="#64748b" font-size="10">agent hits endpoint</text>

    <rect x="350" y="40" width="200" height="100" rx="12" fill="#1a0a20" stroke="#ff006e" stroke-width="2" filter="url(#g)"/>
    <text x="450" y="75" text-anchor="middle" fill="#ff006e" font-size="13" font-weight="700">2 · PAY</text>
    <text x="450" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">HTTP 402 → sign</text>
    <text x="450" y="118" text-anchor="middle" fill="#64748b" font-size="10">stablecoin transfer</text>

    <rect x="670" y="40" width="200" height="100" rx="12" fill="#1a1500" stroke="#ffbe0b" stroke-width="2" filter="url(#g)"/>
    <text x="770" y="75" text-anchor="middle" fill="#ffbe0b" font-size="13" font-weight="700">3 · WORK</text>
    <text x="770" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">200 + payload</text>
    <text x="770" y="118" text-anchor="middle" fill="#64748b" font-size="10">settlement receipt</text>
  </g>

  <!-- Animated packet along path -->
  <path id="track" d="M230 90 L350 90" stroke="url(#p)" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.7"/>
  <path id="track2" d="M550 90 L670 90" stroke="url(#p)" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.7"/>

  <circle r="6" fill="#00f5d4" filter="url(#g)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M230 90 L350 90"/>
  </circle>
  <circle r="6" fill="#ff006e" filter="url(#g)">
    <animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite" path="M550 90 L670 90"/>
  </circle>

  <!-- Arrows -->
  <polygon points="340,84 350,90 340,96" fill="#00f5d4"/>
  <polygon points="660,84 670,90 660,96" fill="#ff006e"/>
</svg>
